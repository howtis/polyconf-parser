[client]
host=db.example.com
port=3306
database=myapp
user=app_user
password=app_pass
charset=utf8mb4

[client.ssl]
ca=/etc/ssl/ca-cert.pem
cert=/etc/ssl/client-cert.pem
key=/etc/ssl/client-key.pem

[server]
bind-address=0.0.0.0
port=3306
max_connections=200
innodb_buffer_pool_size=2G
innodb_log_file_size=512M
