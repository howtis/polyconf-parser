# Properties file with escape sequences
app.name = My Application
app.description = First line.\nSecond line.\nThird line.

# Common escape sequences
paths.windows = C:\\Users\\Admin\\Documents
paths.unix = /home/user/documents

# Tab-separated values
columns = col1\tcol2\tcol3

# Unicode escapes
currency.jpy = \u00A5
currency.gbp = \u00A3

# Escaped key-value separator
special = key\=value

# Multi-line value with backslash continuation
long.value = This is a very long \
    value that continues \
    on the next line
