# Logging configuration
log.level=INFO
log.format=json
log.output=file
log.file.path=/var/log/app/app.log
log.file.max-size=10MB
log.file.max-backups=5
log.file.max-age=30d
log.file.compress=true

# Console output
log.console.enabled=true
log.console.color=true

# Specific loggers
log.logger.com.example.app=DEBUG
log.logger.org.springframework=WARN
log.logger.com.zaxxer.hikari=ERROR
